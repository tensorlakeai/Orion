node:
  id: 3
  raft_addr: "0.0.0.0:7103"
  advertised_raft_addr: "orion-node3:7103"
  topology:
    cloud: "azure"
    region: "eastus"
    zone: "1"

roles: ["all"]

storage:
  object_store:
    type: local
    root: "/var/lib/orion/object-store-node3"
  local:
    data_root: "/var/lib/orion/node-3"
    sqlite_cache_root: "/var/lib/orion/sqlite-cache/node-3"
  object_prefixes:
    node_state: "node-3/state"

peers:
  - id: 1
    raft_addr: "orion-node1:7101"
    libsql_http_addr: "http://orion-node1:8080"
    topology:
      cloud: "aws"
      region: "us-east-1"
      zone: "use1-az1"
  - id: 2
    raft_addr: "orion-node2:7102"
    libsql_http_addr: "http://orion-node2:8080"
    topology:
      cloud: "aws"
      region: "us-east-1"
      zone: "use1-az2"

bootstrap:
  create_default_group: false
  default_group:
    group_id: "rg_default"
    voters: [1, 2, 3]

raft:
  cluster_name: "orion-docker-compat"
  heartbeat_interval_ms: 100
  election_timeout_min_ms: 600
  election_timeout_max_ms: 1200
  replication_lag_threshold: 20000
  install_snapshot_timeout_ms: 60000
  max_payload_entries: 512
  max_append_entries: 4096
  snapshot_max_chunk_size: 4194304
  snapshot_policy:
    logs_since_last: 10000
  max_in_snapshot_log_to_keep: 2000
  purge_batch_size: 512

transport:
  connect_timeout_ms: 1000
  rpc_timeout_ms: 5000
  max_message_size: 8388608

compaction:
  enabled: true

metrics:
  log_interval_ms: 10000

readiness:
  timeout_ms: 30000
  probe_interval_ms: 100
  probe_rpc_timeout_ms: 1000

libsql_http:
  bind_addr: "0.0.0.0:8080"
